<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>PatchThis.App</title>
    <meta name="author" content="Jerry Gamblin">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.19/css/dataTables.bootstrap4.min.css">
</head>

<body>
    <div class="container-fluid">
        <main class="row">
            <div class="col">
                <h1>PatchThis.app</h1>
                <p>Patchthis.app provides a combined list of CVEs that organizations should prioritize for remediation from the following open source sources:</p>

                <ul>
                    <li><a href="https://www.cisa.gov/known-exploited-vulnerabilities-catalog">CISA&nbsp;Known Exploited Vulnerabilities Catalog</a></li>
                    <li><a href="https://docs.rapid7.com/metasploit/modules/">Metasploit Modules</a></li>
                    <li><a href="https://www.first.org/epss/">EPSS </a>Vulnerabilities&nbsp;Scoring Above .90 (on a 0.0 to 1.0 scale)</li>
                </ul>
                
                <p>&nbsp;</p>
                <div id="table-container"></div>
            </div>
        </main>
        <footer class="row">
        </footer>
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.2.1/js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery.csv.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/dataTables.bootstrap4.min.js"></script>
    <script src="js/csv_to_html_table.js"></script>

    <script>
        function format_link(link) {
            if (link)
                return "<a href='" + link + "' target='_blank'>" + link + "</a>";
            else return "";
        }

        CsvToHtmlTable.init({
            csv_path: "https://raw.githubusercontent.com/jgamblin/patchthisapp/main/data/data.csv",
            element: "table-container",
            allow_download: true,
            csv_options: {
                separator: ",",
                delimiter: '"'
            },
            datatables_options: {
                paging: true
            },
            element: 'table-container',
            custom_formatting: [
            ],
            columnDefs: [
        {
            target: 4,
            visible: false,
            searchable: false
        },
    ]

        });
    </script>
</body>

</html>
